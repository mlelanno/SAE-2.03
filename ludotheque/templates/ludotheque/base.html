<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ludotheque SAE</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #222222;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #555555;
        }
        h1 {
            color: #ff9900;
            margin: 0;
        }
        .nav-links {
            margin-top: 10px;
        }
        .nav-links a {
            color: #66b3ff;
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
            font-size: 18px;
        }
        .nav-links a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
        .main-container {
            width: 85%;
            margin: 30px auto;
            background-color: #1e1e1e;
            padding: 25px;
            border: 1px solid #444444;
        }
        .alert-box {
            background-color: #003300;
            color: #00ff00;
            padding: 15px;
            border: 2px solid #00ff00;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gestion de la Ludotheque</h1>
        <div class="nav-links">
            <a href="{% url 'home' %}">Accueil</a>
            <a href="{% url 'liste_jeux' %}">Catalogue des jeux</a>
            <a href="{% url 'ajouter_jeu' %}">+ Ajouter un jeu</a>
        </div>
    </div>

    <div class="main-container">
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert-box">
                    Message systeme : {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
        
    </div>

</body>
</html>
